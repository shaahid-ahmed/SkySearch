<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SkySearch{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #0a0e1a;
      --paper:     #f5f3ee;
      --accent:    #d4460a;
      --muted:     #6b6b72;
      --border:    #d0cec8;
      --card:      #ffffff;
      --mono:      'Space Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      border-bottom: 1.5px solid var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      background: var(--paper);
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-decoration: none;
      color: var(--ink);
    }
    .nav-logo span { color: var(--accent); }
    .nav-tag {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ── LAYOUT ── */
    main { max-width: 900px; margin: 0 auto; padding: 3rem 2rem; }

    /* ── HEADINGS ── */
    h1 {
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: .4rem;
    }
    h2 {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
    }
    .sub {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 2.5rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--ink);
      border-radius: 2px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    /* ── FORM ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    label {
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    input {
      font-family: var(--mono);
      font-size: .95rem;
      padding: .65rem .85rem;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      background: var(--paper);
      color: var(--ink);
      transition: border-color .15s;
      width: 100%;
    }
    input:focus {
      outline: none;
      border-color: var(--ink);
    }
    input::placeholder { color: var(--muted); }

    /* ── BUTTON ── */
    .btn {
      font-family: var(--mono);
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .75rem 2rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background .15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background: var(--accent); }
    .btn-outline {
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--ink);
    }
    .btn-outline:hover { background: var(--ink); color: var(--paper); }

    /* ── ERROR / NOTICE ── */
    .notice {
      border-left: 3px solid var(--accent);
      padding: .8rem 1rem;
      background: #fff8f6;
      font-size: .9rem;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }

    /* ── FLIGHT ROW ── */
    .flight-list { display: flex; flex-direction: column; gap: .75rem; }
    .flight-row {
      display: grid;
      grid-template-columns: 90px 1fr 1fr 120px 1fr 110px;
      align-items: center;
      gap: 1rem;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      padding: 1rem 1.2rem;
      background: var(--card);
      text-decoration: none;
      color: var(--ink);
      transition: border-color .15s, transform .1s;
    }
    .flight-row:hover {
      border-color: var(--ink);
      transform: translateX(3px);
    }
    .flight-num {
      font-family: var(--mono);
      font-weight: 700;
      font-size: .95rem;
    }
    .flight-date {
      font-family: var(--mono);
      font-size: .8rem;
      color: var(--muted);
    }
    .route {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-family: var(--mono);
      font-size: .9rem;
      font-weight: 700;
    }
    .route-arrow { color: var(--muted); font-weight: 400; }
    .pill {
      display: inline-block;
      font-family: var(--mono);
      font-size: .7rem;
      padding: .2rem .6rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      white-space: nowrap;
    }
    .dep-time {
      font-family: var(--mono);
      font-size: .9rem;
    }
    .cta-link {
      font-family: var(--mono);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent);
      text-align: right;
    }

    /* ── LIST HEADER ── */
    .list-header {
      display: grid;
      grid-template-columns: 90px 1fr 1fr 120px 1fr 110px;
      gap: 1rem;
      padding: .4rem 1.2rem;
      margin-bottom: .3rem;
    }
    .list-header span {
      font-family: var(--mono);
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── SEAT MAP ── */
    .seat-grid {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      margin-top: .8rem;
    }
    .seat {
      width: 36px;
      height: 36px;
      border-radius: 4px 4px 2px 2px;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: .7rem;
      font-weight: 700;
    }
    .seat.taken  { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .seat.free   { background: #eaf4ec;    border-color: #7cba87; color: #2a6e35; }

    /* ── STAT STRIP ── */
    .stat-strip {
      display: flex;
      gap: 2rem;
      padding: 1.2rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin: 1.5rem 0;
    }
    .stat { display: flex; flex-direction: column; gap: .2rem; }
    .stat-val {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 700;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
    }
    .stat-val.green { color: #2a6e35; }
    .stat-val.red   { color: var(--accent); }

    /* ── DETAIL TABLE ── */
    .info-table { width: 100%; border-collapse: collapse; }
    .info-table td {
      padding: .55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .9rem;
    }
    .info-table td:first-child {
      font-family: var(--mono);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      width: 40%;
    }
    .info-table tr:last-child td { border-bottom: none; }

    /* ── BACK LINK ── */
    .back { margin-bottom: 2rem; }

    @media (max-width: 680px) {
      .form-grid { grid-template-columns: 1fr; }
      .flight-row { grid-template-columns: 1fr 1fr; }
      .list-header { display: none; }
      .cta-link { display: none; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">SKY<span>.</span>SEARCH</a>
    <span class="nav-tag">NYU CS-GY 6083 &mdash; Spring 2026</span>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
